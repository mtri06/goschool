services:
  app:
    ports:
      - '8080:8080'
    env_file:
      - .env.prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
    container_name: 'goschool-app-prod'

  postgres:
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always
    container_name: 'goschool-postgres-prod'

volumes:
  postgres_prod_data:
