services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
    networks:
      - goschool_net
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_DB_NAME}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    networks:
      - goschool_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_USER} -d ${PG_DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  goschool_net:
    driver: bridge
